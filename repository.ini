;==============================================================================
; VERITAS
;==============================================================================

[Scanner]

Enabled=True

CurrentVersion=0.1.0

Mirror1=
Mirror2=
Mirror3=

SHA256=

Package=veritas.zip

Timeout=15

Priority=Critical


;==============================================================================
; SETTINGS
;==============================================================================

[Settings]

UseHTTPS=True

AllowHTTP=False

RetryCount=3

RetryDelay=2

VerifySHA256=True

BackupBeforeUpdate=True

DeleteTempAfterSuccess=True

KeepBackup=True

CheckInternet=True

AutoSelectMirror=True

LogDownloads=True


;==============================================================================
; MIRROR PRIORITY
;==============================================================================

[Priority]

Mirror1=100

Mirror2=90

Mirror3=80

Mirror4=70


;==============================================================================
; FALLBACK
;==============================================================================

[Fallback]

IfRepositoryUnavailable=Skip

IfChecksumMismatch=Abort

IfDownloadFailed=NextMirror

IfNoMirrorAvailable=Continue

IfInternetUnavailable=Continue


;==============================================================================
; USER REPOSITORIES
;
; Reserved for custom mirrors.
; Do not modify automatically.
;==============================================================================

[UserMirror1]

Name=

URL=

Enabled=False


[UserMirror2]

Name=

URL=

Enabled=False


[UserMirror3]

Name=

URL=

Enabled=False


