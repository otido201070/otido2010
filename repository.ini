; Repository configuration
;
; Mirrors are checked from top to bottom.
; The first available repository is used.
;
; Files are NEVER replaced directly.
;
; Download -> SHA256 -> Backup -> Replace -> Cleanup
;
;==============================================================================


;==============================================================================
; PLATFORM TOOLS
;==============================================================================

[PlatformTools]

Enabled=True

CurrentVersion=36.0.0

Mirror1=
Mirror2=
Mirror3=
Mirror4=

SHA256=

Package=platform-tools.zip

Timeout=15

Priority=Normal


;==============================================================================
; VERITAS DATABASE
;==============================================================================

[Database]

Enabled=True

CurrentVersion=1.0

Mirror1=
Mirror2=
Mirror3=
Mirror4=

SHA256=

Package=database.zip

Timeout=15

Priority=High


;==============================================================================
; OEM MODULES
;==============================================================================

[OEM]

